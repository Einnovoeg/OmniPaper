name: Compile Release
on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      OMNIPAPER_GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Run release compliance gate
        run: python3 scripts/compliance.py check --release

      - name: Generate SPDX SBOM
        run: python3 scripts/compliance.py sbom --output build/omnipaper-${{ github.ref_name }}.spdx.json

      - name: Generate release notes
        run: python3 scripts/extract_changelog.py --version "${{ github.ref_name }}" --output build/release-notes.md

      - name: Build OmniPaper release firmware
        run: |
          pio run -e m5papers3_release

      - name: Assemble merged release image
        run: |
          rm -rf dist
          mkdir -p dist

          BOOT_APP0="$HOME/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin"
          python3 "$HOME/.platformio/packages/tool-esptoolpy/esptool.py" --chip esp32s3 merge_bin \
            --flash_mode dio \
            --flash_freq 80m \
            --flash_size 16MB \
            --output "dist/omnipaper-${{ github.ref_name }}-m5papers3.bin" \
            0x0 .pio/build/m5papers3_release/bootloader.bin \
            0x8000 .pio/build/m5papers3_release/partitions.bin \
            0xE000 "$BOOT_APP0" \
            0x10000 .pio/build/m5papers3_release/firmware.bin

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OmniPaper-${{ github.ref_name }}
          path: dist/*.bin

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release view "${{ github.ref_name }}" --json assets --jq '.assets[].name' | while read -r asset; do
              gh release delete-asset "${{ github.ref_name }}" "$asset" --yes
            done
            gh release upload "${{ github.ref_name }}" dist/*.bin --clobber
            gh release edit "${{ github.ref_name }}" --title "OmniPaper ${{ github.ref_name }}" --notes-file build/release-notes.md
          else
            gh release create "${{ github.ref_name }}" dist/*.bin --title "OmniPaper ${{ github.ref_name }}" --notes-file build/release-notes.md
          fi
